<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first: ajusta a página ao tamanho da tela do celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d24" />
  <meta name="description" content="BR Técnico — simulador de futebol inspirado no Brasfoot." />

  <title>BR Técnico</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/estilo.css" />
</head>
<body>
  <!-- Tela inicial do jogo -->
  <main class="tela tela-inicio" id="tela-inicio">

    <header class="cabecalho">
      <div class="escudo" aria-hidden="true">⚽</div>
      <h1 class="titulo">BR <span>Técnico</span></h1>
      <p class="subtitulo">Simulador de Futebol · Temporada 2026</p>
    </header>

    <nav class="menu">
      <button class="btn btn-primario" id="btn-novo-jogo" type="button">
        Novo Jogo
      </button>
      <button class="btn btn-secundario" id="btn-continuar" type="button" disabled>
        Continuar
      </button>
    </nav>

    <footer class="rodape">
      <p class="status-salvamento" id="status-salvamento">Verificando salvamento…</p>
      <p class="versao">Fase 0 · Esqueleto · v0.1.0</p>
    </footer>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
